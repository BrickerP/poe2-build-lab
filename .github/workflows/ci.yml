name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate build data
        run: python3 scripts/validate_builds.py

      - name: Regenerate site
        run: python3 sitegen.py

      - name: Fail if generated files are stale
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated files are out of date. Run 'python3 sitegen.py' and commit the result."
            git --no-pager diff --stat
            git --no-pager diff
            exit 1
          fi
          echo "Generated files are up to date."
